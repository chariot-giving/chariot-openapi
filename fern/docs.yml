instances:
  - url: https://chariot.docs.buildwithfern.com
    custom-domain: docs.givechariot.com
title: Chariot

versions:
  - display-name: v2026-04-01
    path: versions/v2026-04-01/docs.yml
    slug: v2026-04-01
  - display-name: v2026-01-15
    path: versions/v2026-01-15/docs.yml
    slug: v2026-01-15
  - display-name: v2025-02-24
    path: versions/v2025-02-24/docs.yml
    slug: v2025-02-24
    
  - display-name: v2023-01-01
    path: versions/v2023-01-01/docs.yml
    slug: v2023-01-01
    availability: deprecated
    hidden: true

logo:
  href: /
  light: assets/chariot_full-logo_glacier.png
  dark: assets/chariot_full-logo_white.png
  height: 24

favicon: assets/favicon.png
css: assets/styles.css

settings:
  hide-404-page: true
  http-snippets: false

layout:
  page-width: full
  disable-header: false
  header-height: 62px
  searchbar-placement: header
  tabs-placement: header

navbar-links:
  - type: secondary
    text: Contact us
    url: https://www.givechariot.com/contact
  - type: primary
    text: Login
    url: https://dashboard.givechariot.com/login

footer-links:
  github: https://github.com/chariot-giving
  x: https://x.com/chariotgiving
  linkedin: https://www.linkedin.com/company/givechariot
  website: https://givechariot.com

typography:
  bodyFont:
    name: OpenSans
    path: ./assets/matter.woff2
    weight: "400"
  headingsFont:
    name: OpenSans
    path: ./assets/matter-bold.woff2
    weight: "600"

colors:
  accentPrimary:
    light: "#209AE5"
    dark: "#6DC7FF"
  background:
    light: "#F5F5F5"
    dark: "#051A2E"
  sidebar-background:
    light: "#F5F5F5"
    dark: "#051A2E"
  header-background:
    light: '#F5F5F5'
    dark: "#051A2E"
