      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - disbursement_ids
              properties:
                disbursement_ids:
                  type: array
                  description: Array of disbursement IDs to approve
                  minItems: 1
                  items:
                    type: string
                    example: "disbursement_01jpjen1s23s29kkmnjsb6fzga"
      responses:
        "200":
          description: The disbursements were approved
          content:
            application/json:
              schema:
                type: object
