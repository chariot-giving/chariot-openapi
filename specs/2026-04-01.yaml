  /v1/disbursements:
    post:
      summary: Create a disbursement
      description: |
        Create a disbursement to send money to an organization.
      operationId: createDisbursement
      tags:
        - disbursements
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          description: |-
            A client-generated identifier for the request. Replays with the same key return `409 Conflict`. The successfully created disbursement can later be located via `GET /v1/disbursements?idempotency_key=...`.

            We recommend supplying your own unique identifier for the disbursement in your system, so you can later look it up by an ID you already track.
          required: false
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/CreateDisbursementRequest"
      responses:
        "201":
          description: The disbursement was created
          headers:
            Location:
              $ref: "#/components/headers/Location"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Disbursement"
              examples:
                DafGrantDisbursement:
                  $ref: "#/components/examples/DafGrantDisbursement"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: List disbursements
      description: |
        Returns a list of disbursements.
      operationId: listDisbursements
      tags:
        - disbursements
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: query
          description: The unique identifier for the organization
          required: false
          schema:
            type: string
          example: "org_01jpjenf5q6cawy43yxfcrxhct"
        - name: page_limit
          in: query
          description: Limit the size of the list that is returned. The default (and maximum) is 100 objects.
          required: false
          schema:
            type: integer
            format: int32
        - name: next_page_token
          in: query
          description: |-
            A token to use to retrieve the next page of results. This is useful for paginating over many pages of results. If set, all other arguments are expected to be kept the same as previous calls and the value of this field should be from the nextPageToken in the previous response.
          required: false
          schema:
            type: string
        - name: includes
          in: query
          description: |-
            A comma separated list of fields to include in the response.
            Possible values include:
              - `organization`: Include the organization object in the response.
          required: false
          schema:
            type: string
            example: "organization"
        - name: idempotency_key
          in: query
          description: |-
            Filter to the disbursement created with this exact `Idempotency-Key` header on `POST /v1/disbursements`. Useful for recovering the result of a create request when the response was lost (e.g. network timeout). Returns at most one disbursement. Disbursements created via `POST /v1/disbursements/bulk` cannot be looked up this way.
          required: false
          schema:
            type: string
            example: "8e91b2f3-d7c4-4a59-9a91-72a40b1f2c3d"
      responses:
        "200":
          $ref: "#/components/responses/ListDisbursementsResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/disbursements/bulk:
    post:
      summary: Create multiple disbursements
      description: |
        Create multiple disbursements in a single request.
        This is useful for batch operations where you need to create many disbursements at once.

        All disbursements in the request will be created together. If any disbursement fails validation,
        the entire request will fail and no disbursements will be created.

        **Note:** Disbursements created through this endpoint cannot be looked up via `GET /v1/disbursements?idempotency_key=...`. The `idempotency_key` field on the returned disbursements will be `null`.
      operationId: bulkCreateDisbursements
      tags:
        - disbursements
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/BulkCreateDisbursementsRequest"
      responses:
        "201":
          description: The disbursements were created
          content:
            application/json:
              schema:
                type: object
                required:
                  - disbursements
                  - count
                properties:
                  disbursements:
                    type: array
                    items:
                      $ref: "#/components/schemas/Disbursement"
                  count:
                    type: integer
                    description: The number of disbursements created
                    example: 2
              examples:
                BulkCreateDisbursements:
                  $ref: "#/components/examples/BulkCreateDisbursements"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/AuthenticationError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalServerError"
