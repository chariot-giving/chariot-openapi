    CreateVerificationRequestRequest:
      description: |-
        The request to create a verification request for an unlisted organization.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - ein
              - organization_name
              - recommended_mailing_address
            properties:
              ein:
                type: string
                description: The EIN of the organization to verify
                example: "123456789"
              organization_name:
                type: string
                description: The name of the organization as known to the grantmaker
                example: "Local Community Foundation"
              website:
                type: string
                description: The organization's website URL
                example: "https://localfoundation.org"
              recommended_mailing_address:
                $ref: "#/components/schemas/VerificationRequestAddress"
              contact_email:
                type: string
                description: Contact email for the nonprofit organization.
                example: "contact@localfoundation.org"
    CreateInboundTransferRequest:
      description: The request body for originating an inbound transfer from an external bank account
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - amount
              - account_id
            properties:
              amount:
                type: number
                description: |-
                  The amount of the transfer in cents.
                  This amount must be positive.
                example: 10000
              account_id:
                type: string
                description: |-
                  The identifier of the financial account that will receive the transfer.
                example: "account_01jpjenf5q6cawy43yxfcrxhct"
              description:
                type: string
                description: An arbitrary string attached to the object. Often useful for displaying to users.
                example: "Inbound ACH Transfer from my bank account"
    StopDisbursementRequest:
      description: The request body for stopping a disbursement payment
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - reason
            properties:
              reason:
                $ref: "#/components/schemas/StopDisbursementPaymentReason"
    CreateEventSubscriptionRequest:
      description: The request body for creating an event subscription
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - url
              - category
            properties:
              url:
                type: string
                description: The webhook url where we'll send notifications.
                example: "https://example.com/webhook"
              category:
                $ref: "#/components/schemas/EventCategory"
              signing_secret:
                type: string
                description: |-
                  The key that will be used to sign webhooks.
                  If no value is passed, a random string will be used as default.
                  This is necessary to verify that the webhook is coming from Chariot.
                  While this parameter is optional, it is highly recommended to pass a value
                  for the secret and implement webhook signature verification.
    UpdateEventSubscriptionRequest:
      description: The request body for creating an event subscription
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                description: |-
                  The status of the event subscription:
                    * active: The event subscription is active and events will be delivered
                    * disabled: The event subscription is temporarily disabled and events will not be delivered
                    * deleted: The event subscription is permanently deleted and events will not be delivered
                enum:
                  - "active"
                  - "disabled"
                  - "deleted"
    CreateOutboundTransferRequest:
      description: The request body for creating an outbound transfer
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OutboundTransfer"
    CreateDonorAccountRequest:
      description: |-
        The request to create a new Donor Account.
        Used by DAFs to pre-establish access for a donor before that donor authenticates through DAFpay.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - donor
            properties:
              donor:
                type: object
                description: |-
                  The donor's identity and profile information. `email` is required and **must** match the email the donor will use when authenticating with DAFpay — DAFpay matches incoming verified emails to existing Accounts. Other fields are optional and may be filled in later by the donor during DAFpay profile setup.
                required:
                  - email
                properties:
                  email:
                    type: string
                    description: |-
                      The donor's email. Must match the email the donor will use when authenticating with DAFpay.
                    example: "warrenBuffet@example.com"
                  first_name:
                    type: string
                    description: The donor's first name.
                    example: "Warren"
                  last_name:
                    type: string
                    description: The donor's last name.
                    example: "Buffet"
                  phone:
                    type: string
                    description: The donor's phone number.
                    example: "+12125550100"
              external_id:
                type: string
                description: |-
                  The DAF's internal identifier for this Donor Account. Optional but strongly recommended — it allows you to reconcile DAFpay grants with the donor's record in your own system without an additional update later. Maximum length: 255 characters.
                example: "ACME-DAF-DONOR-1042"
              metadata:
                type: object
                description: A map of arbitrary string keys and values to store information about the object.
                additionalProperties:
                  type: string
    UpdateDonorAccountRequest:
      description: |-
        The request to update mutable properties on a Donor Account.
        Note that the Donor Account's status is managed automatically through the Authorization Token verification flow and cannot be changed directly via this endpoint.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              donor:
                type: object
                description: |-
                  Mutable donor identity fields. Only the fields you pass are updated; omitted fields are left unchanged.
                properties:
                  first_name:
                    type: string
                    description: The donor's first name.
                    example: "Warren"
                  last_name:
                    type: string
                    description: The donor's last name.
                    example: "Buffet"
                  phone:
                    type: string
                    description: The donor's phone number.
                    example: "+12125550100"
              external_id:
                type: string
                description: |-
                  The DAF's internal identifier for this Donor Account. Maximum length: 255 characters.
                example: "ACME-DAF-DONOR-1042"
              metadata:
                type: object
                description: A map of arbitrary string keys and values to store information about the object.
                additionalProperties:
                  type: string
    CreateDonorAuthorizationTokenRequest:
      description: |-
        The request to create a new Authorization Token bound to a Donor Account.
        All fields are optional — an empty body produces a token with default settings.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              expires_in:
                type: integer
                description: |-
                  The number of seconds the token is valid for. Defaults to 30 days. Must be between 60 (1 minute) and 7,776,000 (90 days).
                example: 2592000
              metadata:
                type: object
                description: A map of arbitrary string keys and values to store information about the object.
                additionalProperties:
                  type: string
    VerifyDonorAuthorizationTokenRequest:
      description: |-
        The request to verify an Authorization Token by its `code` value.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - code
            properties:
              code:
                type: string
                description: |-
                  The token's secret code value as provided by the donor. Verification is case-insensitive and tolerant of whitespace and dashes.
                example: "DAFP-7K3X-9M4Q"
              external_id:
                type: string
                description: |-
                  The DAF's internal identifier for this Donor Account. If provided, will be set on the Donor Account as part of the verification. Maximum length: 255 characters.
                example: "ACME-DAF-DONOR-1042"
    SubmitGrantRequest:
      description: |-
        The request to submit a Grant Request.
        All fields are optional — an empty body is valid.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              external_grant_id:
                type: string
                description: |-
                  The DAF's internal identifier for this grant. Setting this at submission time provides a useful audit trail and reconciliation key. Maximum length: 255 characters.
                example: "ACME-GRANT-2026-00481"
              comment:
                type: string
                description: |-
                  An optional comment recorded with the submission. Maximum length: 400 characters.
    RejectGrantRequest:
      description: |-
        The request to reject a Grant Request.
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
                description: |-
                  A human-readable reason for the rejection. Maximum length: 400 characters.
                example: "Grant amount exceeds donor's available balance."
